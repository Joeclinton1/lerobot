# @package _global_

seed: 1000
dataset_repo_id: lerobot/pusht_keypoints

training:
  offline_steps: 200000  # Updated from 100000
  online_steps: 0
  eval_freq: 5000  # Updated from 20000
  save_freq: 5000  # Updated from 20000
  log_freq: 250  # Added logging frequency
  save_checkpoint: true

  batch_size: 64  # Updated from 8
  lr: 1e-4  # Updated from 1e-5
  lr_backbone: 1e-5
  weight_decay: 1e-6  # Updated from 1e-4
  grad_clip_norm: 10
  online_steps_between_rollouts: 1

  delta_timestamps:
    action: "[i / ${fps} for i in range(${policy.chunk_size})]"

eval:
  n_episodes: 50
  batch_size: 50

policy:
  name: act

  # Input / output structure.
  n_obs_steps: 1  # Updated from 1
  chunk_size: 100  # Same as original
  n_action_steps: 8  # Updated from 100

  input_shapes:
    # Removed observation.images.top since no images are used in training.
    observation.environment_state: [16]  # Added for state-based observation
    observation.state: ["${env.state_dim}"]
  output_shapes:
    action: ["${env.action_dim}"]

  # Normalization / Unnormalization
  input_normalization_modes:
    observation.environment_state: min_max  # Added for state-based observation
    observation.state: min_max  # Updated from mean_std
  output_normalization_modes:
    action: min_max  # Updated from mean_std

  # Architecture.
  # Vision backbone. Removed vision_backbone related configurations since no images are used in training.
  vision_backbone: resnet18
  pretrained_backbone_weights: null  # Updated to null
  replace_final_stride_with_dilation: false
  # Transformer layers.
  pre_norm: false
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  feedforward_activation: relu
  n_encoder_layers: 4
  n_decoder_layers: 1  # Same as original
  # VAE.
  use_vae: false #normally true but it doesn't need it
  latent_dim: 32
  n_vae_encoder_layers: 4

  # Inference.
  temporal_ensemble_coeff: null

  # Training and loss computation.
  dropout: 0.1
  kl_weight: 10.0